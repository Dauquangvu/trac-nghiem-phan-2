<title>Trắc nghiệm</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    font-size: 18px; /* 🔥 thêm */
}

.container {
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
    font-size: 22px; /* 🔥 to hơn */
}

.question {

button {

    margin: 6px 0;
    padding: 12px; /* 🔥 to nút */

    border-radius: 8px;
    text-align: left;
    background: #eef1f5;

}

button:hover {

}
.correct {

}
.wrong {
    background: #f7c5c5 !important;

    font-weight: bold;
}
.score {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}
.progress {
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;

.progress-bar {
    height: 10px;

    for (let i = array.length - 1; i > 0; i--) {

        [array[i], array[j]] = [array[j], array[i]];

// 🔀 Trộn câu hỏi
shuffle(questions);

const quizDiv = document.getElementById("quiz");

// 👉 Render câu hỏi
questions.forEach((q, index) => {

    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerHTML = "<b>Câu " + (index + 1) + ":</b> " + q.q;
    div.appendChild(title);

    // 👉 GẮN ĐÚNG/SAI + TRỘN ĐÁP ÁN
    let answers = q.answers.map((a,i)=>({
        text: a,
        correct: i === q.correct
    }));

    shuffle(answers);

    answers.forEach((ans, i) => {

        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65+i) + ". " + ans.text;

        btn.onclick = () => {

            if(div.classList.contains("done")) return;
            div.classList.add("done");

            answered++;

            if(ans.correct){
                btn.classList.add("correct");
                btn.innerText += " ✅";
                score++;
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌";

                // 👉 HIỆN ĐÁP ÁN ĐÚNG
                const buttons = div.querySelectorAll("button");
                answers.forEach((a, idx) => {
                    if(a.correct){
                        buttons[idx].classList.add("correct");
                        buttons[idx].innerText += " ⭐";
                    }
                });
            }

            // 👉 CẬP NHẬT ĐIỂM
            document.getElementById("score").innerText =
                "Điểm: " + score + "/" + questions.length;

            // 👉 PROGRESS BAR
            document.getElementById("progress").style.width =
                (answered / questions.length * 100) + "%";
        };

        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});
